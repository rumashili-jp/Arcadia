<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>World Builder Prototype</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&family=Noto+Sans+JP:wght@300;400;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --sidebar-width: 64px;
            --panel-width: 350px;
            --node-person: #3b82f6;
            --node-organization: #8b5cf6;
            --node-location: #10b981;
            --node-item: #f59e0b;
        }

        body {
            font-family: 'Inter', 'Noto Sans JP', sans-serif;
            overflow: hidden;
            background-color: #f8fafc;
            height: 100vh;
            height: 100dvh;
        }

        /* Sidebar & Navigation */
        #sidebar {
            width: var(--sidebar-width);
            background-color: #1e293b;
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 1rem 0;
            z-index: 50;
            overflow-y: auto;
            scrollbar-width: none;
        }
        #sidebar::-webkit-scrollbar {
            display: none;
        }

        .tool-btn {
            width: 44px;
            height: 44px;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #94a3b8;
            margin-bottom: 1rem;
            transition: all 0.2s ease;
            cursor: pointer;
            position: relative;
        }

        .tool-btn:hover {
            color: white;
            background-color: #334155;
        }

        .tool-btn.active {
            color: white;
            background-color: #3b82f6;
            box-shadow: 0 0 15px rgba(59, 130, 246, 0.5);
        }

        /* Workspace & Graph */
        #workspace {
            flex-grow: 1;
            height: 100vh;
            height: 100dvh;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        #graph-svg {
            width: 100%;
            height: 100%;
            cursor: grab;
            background-image: radial-gradient(#e2e8f0 1px, transparent 1px);
            background-size: 30px 30px;
        }

        #graph-svg:active { cursor: grabbing; }

        /* Nodes & Links */
        .node-circle {
            stroke: #fff;
            stroke-width: 2px;
            transition: stroke-width 0.2s;
        }
        .node-circle:hover { stroke-width: 4px; }
        .node-label {
            font-size: 12px;
            font-weight: 600;
            pointer-events: none;
            fill: #1e293b;
            text-shadow: 0 0 4px white;
        }
        .link-line {
            stroke: #cbd5e1;
            stroke-opacity: 0.6;
            stroke-width: 2px;
            transition: stroke-opacity 0.2s;
            fill: none;
        }
        .link-label {
            font-size: 10px;
            fill: #64748b;
            pointer-events: none;
        }

        /* Info Panel */
        #info-panel {
            position: absolute;
            top: 0;
            right: -350px;
            width: var(--panel-width);
            height: 100%;
            background: white;
            box-shadow: -5px 0 25px rgba(0,0,0,0.05);
            transition: right 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            z-index: 40;
            display: flex;
            flex-direction: column;
            border-left: 1px solid #e2e8f0;
        }

        #info-panel.open { right: 0; }

        #info-panel > div {
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
            touch-action: auto;
        }

        .lore-card {
            background: white;
            border-radius: 1rem;
            border: 1px solid #e2e8f0;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1);
            padding: 1.5rem;
            margin-bottom: 1.5rem;
            transition: transform 0.2s;
        }
        .lore-card:hover { transform: translateY(-2px); }
        
        #view-lore {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            overflow-y: auto !important;
            -webkit-overflow-scrolling: touch;
            touch-action: auto;
            background-color: #f8fafc;
        }

        .lore-relation-link {
            color: #2563eb;
            cursor: pointer;
            text-decoration: underline;
            font-weight: 500;
        }

        .edit-input, .edit-textarea {
            width: 100%;
            border: 1px solid #d1d5db;
            border-radius: 0.5rem;
            padding: 0.75rem;
            margin-bottom: 0.75rem;
            font-size: 0.875rem;
            background-color: #f9fafb;
        }
        .edit-input:focus, .edit-textarea:focus {
            border-color: #3b82f6;
            ring: 2px solid #bfdbfe;
            outline: none;
        }

        .mode-btn-active {
            background-color: #ef4444 !important;
            color: white !important;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        #top-header {
            background: white;
            border-bottom: 1px solid #e2e8f0;
            padding: 0.75rem 1.5rem;
            display: flex;
            align-items: center;
            z-index: 30;
        }
    </style>
</head>
<body class="flex">

    <nav id="sidebar">
        <div class="mb-8 text-blue-500 text-2xl">
            <i class="fa-solid fa-earth-asia"></i>
        </div>
        <div class="tool-btn active" data-target="view-graph" title="ワールドマップ">
            <i class="fa-solid fa-note-sticky"></i>
        </div>
        <div class="tool-btn" data-target="view-lore" title="ロアブック">
            <i class="fa-solid fa-book"></i>
        </div>
        <div class="tool-btn" data-target="view-map" title="地図表示">
            <i class="fa-solid fa-map"></i>
        </div>
        <div class="tool-btn" data-target="view-timeline" title="年表">
            <i class="fa-solid fa-table-list"></i>
        </div>
        <div class="mt-auto">
            <div class="tool-btn" onclick="exportWorldData()" title="世界設定を保存 (JSONエクスポート)">
                <i class="fa-solid fa-download"></i>
            </div>
            <div class="tool-btn" onclick="document.getElementById('import-file').click()" title="世界設定を読み込む (JSONインポート)">
                <i class="fa-solid fa-upload"></i>
            </div>
            <input type="file" id="import-file" style="display:none" accept=".json" onchange="importWorldData(event)">
        </div>
    </nav>

    <main id="workspace">
        <header id="top-header">
            <div class="flex items-center space-x-3 w-full max-w-xl">
                <label for="world-name-input" class="text-xs font-black text-slate-400 uppercase tracking-widest whitespace-nowrap">World Name:</label>
                <input type="text" id="world-name-input" class="bg-slate-50 border-none rounded-lg px-3 py-1.5 text-sm font-bold text-slate-700 w-full focus:ring-2 focus:ring-blue-100 outline-none" placeholder="世界の名称を入力...">
            </div>
        </header>

        <div class="flex-grow relative">
            <div id="view-graph" class="h-full w-full block">
                <svg id="graph-svg"></svg>
                <div class="absolute bottom-8 right-8 flex flex-col space-y-4">
                    <button id="btn-link-mode" onclick="toggleLinkMode()" class="bg-slate-700 hover:bg-slate-800 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-xl transition-all" title="関係を繋ぐモード">
                        <i class="fa-solid fa-link text-xl"></i>
                    </button>
                    <button onclick="showAddNodeModal()" class="bg-blue-600 hover:bg-blue-700 text-white rounded-full w-14 h-14 flex items-center justify-center shadow-xl transition-all transform hover:scale-110" title="ノードを追加">
                        <i class="fa-solid fa-plus text-2xl"></i>
                    </button>
                </div>
                <div id="link-mode-toast" class="absolute top-6 left-1/2 -translate-x-1/2 bg-red-600 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity pointer-events-none font-bold z-50">
                    <i class="fa-solid fa-link-slash mr-2"></i>関係線モード：2つのノードをクリックしてください
                </div>
            </div>
            
            <div id="view-lore" class="hidden h-full w-full bg-slate-50 overflow-y-auto">
                <div class="max-w-4xl mx-auto py-12 px-6 pb-24">
                    <div class="flex items-center justify-between mb-8 border-b-2 border-slate-200 pb-4">
                        <div>
                            <h2 class="text-4xl font-black text-slate-800">Lorebook</h2>
                            <div class="text-slate-400 text-sm">世界設定辞書</div>
                        </div>
                        <button onclick="exportLorebookText()" class="bg-slate-800 hover:bg-slate-700 text-white px-4 py-2 rounded-xl text-sm font-bold shadow-lg transition flex items-center">
                            <i class="fa-solid fa-file-lines mr-2"></i>TXTで出力
                        </button>
                    </div>
                    <div id="lorebook-content" class="space-y-6"></div>
                </div>
            </div>
            
            <div id="view-map" class="hidden h-full w-full flex items-center justify-center bg-slate-100">
                <div class="text-center text-slate-400">
                    <i class="fa-solid fa-map text-6xl mb-4"></i>
                    <p class="text-xl">地図表示機能は開発中です</p>
                </div>
            </div>
            <div id="view-timeline" class="hidden h-full w-full flex items-center justify-center bg-slate-100">
                <div class="text-center text-slate-400">
                    <i class="fa-solid fa-table-list text-6xl mb-4"></i>
                    <p class="text-xl">年表機能は開発中です</p>
                </div>
            </div>

            <aside id="info-panel">
                <div class="p-6 h-full flex flex-col">
                    <button onclick="closeInfoPanel()" class="absolute top-4 right-4 text-slate-400 hover:text-slate-600">
                        <i class="fa-solid fa-xmark text-xl"></i>
                    </button>
                    <div id="info-content">
                        <div id="info-type-badge" class="inline-block px-3 py-1 rounded-full text-xs font-bold text-white mb-2">TYPE</div>
                        <h3 id="info-title" class="text-2xl font-bold text-slate-800 mb-4">タイトル</h3>
                        <div class="mb-6">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">説明</label>
                            <p id="info-desc" class="text-slate-600 leading-relaxed bg-slate-50 p-4 rounded-xl border border-slate-100 whitespace-pre-wrap">説明がここに表示されます。</p>
                        </div>
                        <div class="mb-6">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">タグ</label>
                            <div id="info-tags" class="flex flex-wrap gap-2"></div>
                        </div>
                        <div class="flex-grow">
                            <label class="text-xs font-bold text-slate-400 uppercase tracking-wider block mb-2">関係性</label>
                            <ul id="info-relations" class="space-y-2"></ul>
                        </div>
                        <div class="mt-8 border-t pt-6">
                            <button onclick="openEditMode()" class="w-full bg-slate-100 hover:bg-slate-200 text-slate-700 font-bold py-3 px-4 rounded-xl transition flex items-center justify-center">
                                <i class="fa-solid fa-pen-to-square mr-2"></i>設定を編集する
                            </button>
                        </div>
                    </div>
                    <div id="info-edit" class="hidden">
                        <h3 class="text-xl font-bold mb-6 text-slate-800 border-b pb-2">ノードの編集</h3>
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-slate-700 mb-1">名称</label>
                            <input type="text" id="edit-node-title" class="edit-input">
                        </div>
                        <div class="mb-4">
                            <label class="block text-sm font-bold text-slate-700 mb-1">詳細設定</label>
                            <textarea id="edit-node-desc" class="edit-textarea" rows="5"></textarea>
                        </div>
                        <div class="mb-6">
                            <label class="block text-sm font-bold text-slate-700 mb-1">タグ (カンマ区切り)</label>
                            <input type="text" id="edit-node-tags" class="edit-input" placeholder="勇者, 王国, 伝説">
                        </div>
                        <div class="grid grid-cols-2 gap-3">
                            <button onclick="saveNodeEdit()" class="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 rounded-xl shadow-lg transition">保存</button>
                            <button onclick="cancelEditMode()" class="bg-slate-200 hover:bg-slate-300 text-slate-700 font-bold py-3 rounded-xl transition">戻る</button>
                        </div>
                        <div class="mt-8 pt-6 border-t border-red-100">
                            <button onclick="deleteNode()" class="w-full bg-red-50 hover:bg-red-100 text-red-600 font-bold py-3 rounded-xl transition flex items-center justify-center border border-red-200">
                                <i class="fa-solid fa-trash-can mr-2"></i>このノードを完全に削除
                            </button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </main>

    <div id="modal-add-node" class="fixed inset-0 bg-slate-900/60 hidden z-[100] flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 w-[400px] shadow-2xl">
            <h3 class="text-2xl font-bold mb-6">新規ノード作成</h3>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">名前</label>
                    <input type="text" id="new-node-name" class="w-full border p-3 rounded-xl outline-blue-500" placeholder="例: アルス">
                </div>
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">種類</label>
                    <select id="new-node-type" class="w-full border p-3 rounded-xl outline-blue-500 bg-white">
                        <option value="person">人物</option>
                        <option value="organization">組織</option>
                        <option value="location">場所</option>
                        <option value="item">アイテム</option>
                    </select>
                </div>
                <div class="flex space-x-3 pt-4">
                    <button onclick="addNode()" class="flex-1 bg-blue-600 text-white py-3 rounded-xl font-bold hover:bg-blue-700 shadow-lg transition">作成</button>
                    <button onclick="hideAddNodeModal()" class="flex-1 bg-slate-100 text-slate-600 py-3 rounded-xl font-bold hover:bg-slate-200">キャンセル</button>
                </div>
            </div>
        </div>
    </div>

    <div id="modal-add-link" class="fixed inset-0 bg-slate-900/60 hidden z-[100] flex justify-center items-center backdrop-blur-sm">
        <div class="bg-white rounded-2xl p-8 w-[400px] shadow-2xl">
            <h3 class="text-2xl font-bold mb-6">関係線を繋ぐ</h3>
            <div class="bg-blue-50 p-4 rounded-xl mb-6 text-center">
                <span id="link-src" class="font-bold text-blue-700">Source</span>
                <i class="fa-solid fa-arrow-right mx-3 text-blue-300"></i>
                <span id="link-trg" class="font-bold text-blue-700">Target</span>
            </div>
            <div class="space-y-4">
                <div>
                    <label class="block text-sm font-bold text-slate-700 mb-1">関係名</label>
                    <input type="text" id="link-relation" class="w-full border p-3 rounded-xl outline-blue-500" placeholder="例: 師匠, 敵対">
                </div>
                <button onclick="confirmCreateLink()" class="w-full bg-green-600 text-white py-3 rounded-xl font-bold hover:bg-green-700 shadow-lg transition">関係を確定</button>
                <button onclick="closeLinkModal()" class="w-full text-slate-400 py-2 hover:text-slate-600 transition">閉じる</button>
            </div>
        </div>
    </div>

    <div id="notification" class="fixed bottom-10 left-1/2 -translate-x-1/2 bg-slate-800 text-white px-6 py-3 rounded-full shadow-2xl opacity-0 transition-opacity z-[200]">メッセージ</div>

    <script>
        let nodesData = [
            { id: "1", title: "勇者アルス", type: "person", description: "辺境の村出身の青年。聖剣の持ち主。", tags: ["主人公", "剣士"] },
            { id: "2", title: "王都グランデ", type: "location", description: "大陸最大の王国、グランデの首都。", tags: ["重要拠点"] },
            { id: "3", title: "聖騎士団", type: "organization", description: "王都を守護するエリート騎士集団。", tags: ["軍事"] }
        ];
        let linksData = [
            { source: "1", target: "2", relation: "出身地" },
            { source: "3", target: "2", relation: "所属" }
        ];

        let currentEditingNodeId = null;
        let isLinkMode = false;
        let linkSourceNode = null;

        const svg = d3.select("#graph-svg");
        const g = svg.append("g");
        
        const linkLayer = g.append("g").attr("class", "links-layer");
        const nodeLayer = g.append("g").attr("class", "nodes-layer");
        
        const colorMap = {
            person: "var(--node-person)",
            organization: "var(--node-organization)",
            location: "var(--node-location)",
            item: "var(--node-item)"
        };

        const zoom = d3.zoom().scaleExtent([0.1, 4]).on("zoom", (event) => g.attr("transform", event.transform));
        svg.call(zoom);

        const simulation = d3.forceSimulation()
            .force("link", d3.forceLink().id(d => d.id).distance(150))
            .force("charge", d3.forceManyBody().strength(-500))
            .force("center", d3.forceCenter(window.innerWidth / 2, (window.innerHeight - 50) / 2))
            .force("collision", d3.forceCollide().radius(60));

        function updateGraph() {
            const link = linkLayer.selectAll(".link-group").data(linksData, d => {
                const s = typeof d.source === 'object' ? d.source.id : d.source;
                const t = typeof d.target === 'object' ? d.target.id : d.target;
                return `${s}-${t}`;
            });
            link.exit().remove();
            
            const linkEnter = link.enter().append("g").attr("class", "link-group");
            linkEnter.append("path").attr("class", "link-line");
            linkEnter.append("text").attr("class", "link-label").attr("text-anchor", "middle");

            const node = nodeLayer.selectAll(".node-group").data(nodesData, d => d.id);
            node.exit().remove();

            const nodeEnter = node.enter().append("g")
                .attr("class", "node-group")
                .call(d3.drag()
                    .on("start", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0.3).restart();
                        d.fx = d.x; d.fy = d.y;
                    })
                    .on("drag", (event, d) => { d.fx = event.x; d.fy = event.y; })
                    .on("end", (event, d) => {
                        if (!event.active) simulation.alphaTarget(0);
                        d.fx = null; d.fy = null;
                    })
                )
                .on("click", (event, d) => {
                    if (isLinkMode) handleLinkSelect(d);
                    else showNodeInfo(d);
                });

            nodeEnter.append("circle").attr("class", "node-circle").attr("r", 25)
                .attr("fill", d => colorMap[d.type]);
            
            nodeEnter.append("text")
                .attr("class", "node-label")
                .attr("text-anchor", "middle")
                .attr("dy", 40)
                .text(d => d.title);

            const mergedLinks = linkEnter.merge(link);
            const mergedNodes = nodeEnter.merge(node);

            simulation.nodes(nodesData);
            simulation.force("link").links(linksData);
            simulation.alpha(1).restart();

            simulation.on("tick", () => {
                mergedLinks.select("path")
                    .attr("d", d => {
                        // 座標計算。d.source や d.target がまだオブジェクトでない（文字列のまま）場合は座標を計算できない。
                        if (typeof d.source !== 'object' || typeof d.target !== 'object') return "";

                        const dx = d.target.x - d.source.x;
                        const dy = d.target.y - d.source.y;
                        const dr = Math.sqrt(dx * dx + dy * dy);
                        
                        const isBidirectional = linksData.some(l => {
                            const s = typeof l.source === 'object' ? l.source.id : l.source;
                            const t = typeof l.target === 'object' ? l.target.id : l.target;
                            const d_s = d.source.id;
                            const d_t = d.target.id;
                            return s === d_t && t === d_s;
                        });

                        if (isBidirectional) {
                            return `M${d.source.x},${d.source.y}A${dr},${dr} 0 0,1 ${d.target.x},${d.target.y}`;
                        } else {
                            return `M${d.source.x},${d.source.y}L${d.target.x},${d.target.y}`;
                        }
                    });

                mergedLinks.select("text")
                    .attr("transform", d => {
                        if (typeof d.source !== 'object' || typeof d.target !== 'object') return "";

                        const dx = d.target.x - d.source.x;
                        const dy = d.target.y - d.source.y;
                        const dr = Math.sqrt(dx * dx + dy * dy);
                        
                        const isBidirectional = linksData.some(l => {
                            const s = typeof l.source === 'object' ? l.source.id : l.source;
                            const t = typeof l.target === 'object' ? l.target.id : l.target;
                            const d_s = d.source.id;
                            const d_t = d.target.id;
                            return s === d_t && t === d_s;
                        });

                        if (isBidirectional) {
                            const midX = (d.source.x + d.target.x) / 2;
                            const midY = (d.source.y + d.target.y) / 2;
                            const offsetX = (dy / dr) * 20; 
                            const offsetY = (-dx / dr) * 20;
                            return `translate(${midX + offsetX}, ${midY + offsetY})`;
                        } else {
                            return `translate(${(d.source.x + d.target.x) / 2}, ${(d.source.y + d.target.y) / 2 - 10})`;
                        }
                    })
                    .text(d => d.relation);

                mergedNodes.attr("transform", d => `translate(${d.x},${d.y})`);
            });
        }

        function showNodeInfo(d) {
            currentEditingNodeId = d.id;
            cancelEditMode();
            const panel = document.getElementById('info-panel');
            document.getElementById('info-title').innerText = d.title;
            document.getElementById('info-desc').innerText = d.description || "説明はありません。";
            const badge = document.getElementById('info-type-badge');
            badge.innerText = d.type.toUpperCase();
            badge.style.backgroundColor = colorMap[d.type];
            const tagsContainer = document.getElementById('info-tags');
            tagsContainer.innerHTML = '';
            (d.tags || []).forEach(tag => {
                const span = document.createElement('span');
                span.className = 'px-2 py-1 bg-slate-100 text-slate-600 rounded text-xs font-bold';
                span.innerText = tag;
                tagsContainer.appendChild(span);
            });
            const relsContainer = document.getElementById('info-relations');
            relsContainer.innerHTML = '';
            const rels = linksData.filter(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return s === d.id || t === d.id;
            });
            if (rels.length > 0) {
                rels.forEach(r => {
                    const sId = typeof r.source === 'object' ? r.source.id : r.source;
                    const otherId = sId === d.id ? (typeof r.target === 'object' ? r.target.id : r.target) : sId;
                    const other = nodesData.find(n => n.id === otherId);
                    if (other) {
                        const li = document.createElement('li');
                        li.className = 'text-sm bg-blue-50 p-2 rounded-lg flex items-center justify-between';
                        li.innerHTML = `<span>${r.relation}</span><span class="font-bold text-blue-600 cursor-pointer" onclick="jumpToNode('${other.id}')">${other.title}</span>`;
                        relsContainer.appendChild(li);
                    }
                });
            } else {
                relsContainer.innerHTML = '<li class="text-slate-400 text-xs italic">関係性はまだありません</li>';
            }
            panel.classList.add('open');
        }

        function jumpToNode(id) {
            const node = nodesData.find(n => n.id === id);
            if (node) showNodeInfo(node);
        }

        function closeInfoPanel() {
            document.getElementById('info-panel').classList.remove('open');
        }

        function openEditMode() {
            const node = nodesData.find(n => n.id === currentEditingNodeId);
            document.getElementById('edit-node-title').value = node.title;
            document.getElementById('edit-node-desc').value = node.description || "";
            document.getElementById('edit-node-tags').value = (node.tags || []).join(', ');
            document.getElementById('info-content').classList.add('hidden');
            document.getElementById('info-edit').classList.remove('hidden');
        }

        function cancelEditMode() {
            document.getElementById('info-content').classList.remove('hidden');
            document.getElementById('info-edit').classList.add('hidden');
        }

        function saveNodeEdit() {
            const node = nodesData.find(n => n.id === currentEditingNodeId);
            node.title = document.getElementById('edit-node-title').value;
            node.description = document.getElementById('edit-node-desc').value;
            node.tags = document.getElementById('edit-node-tags').value.split(',').map(s => s.trim()).filter(s => s);
            updateGraph();
            showNodeInfo(node);
            showNotification("保存しました");
        }

        function toggleLinkMode() {
            isLinkMode = !isLinkMode;
            linkSourceNode = null;
            const btn = document.getElementById('btn-link-mode');
            const toast = document.getElementById('link-mode-toast');
            if (isLinkMode) {
                btn.classList.add('mode-btn-active');
                toast.classList.remove('opacity-0');
            } else {
                btn.classList.remove('mode-btn-active');
                toast.classList.add('opacity-0');
            }
        }

        function handleLinkSelect(d) {
            if (!linkSourceNode) {
                linkSourceNode = d;
                showNotification(`${d.title} を選択。次に繋ぐノードを選択してください。`);
            } else {
                if (linkSourceNode.id === d.id) return;
                document.getElementById('link-src').innerText = linkSourceNode.title;
                document.getElementById('link-trg').innerText = d.title;
                const modal = document.getElementById('modal-add-link');
                modal.dataset.src = linkSourceNode.id;
                modal.dataset.trg = d.id;
                modal.classList.remove('hidden');
                toggleLinkMode();
            }
        }

        function confirmCreateLink() {
            const modal = document.getElementById('modal-add-link');
            const srcId = modal.dataset.src;
            const trgId = modal.dataset.trg;
            const rel = document.getElementById('link-relation').value || "関係";
            const existingLink = linksData.find(l => {
                const s = typeof l.source === 'object' ? l.source.id : l.source;
                const t = typeof l.target === 'object' ? l.target.id : l.target;
                return s === srcId && t === trgId;
            });
            if (existingLink) {
                existingLink.relation = rel;
                showNotification(`「${rel}」に関係を更新しました`);
            } else {
                linksData.push({ source: srcId, target: trgId, relation: rel });
                showNotification("関係を作成しました");
            }
            updateGraph();
            closeLinkModal();
        }

        function closeLinkModal() { document.getElementById('modal-add-link').classList.add('hidden'); }

        document.querySelectorAll('.tool-btn[data-target]').forEach(btn => {
            btn.onclick = () => {
                const target = btn.getAttribute('data-target');
                document.querySelectorAll('div[id^="view-"]').forEach(v => v.classList.add('hidden'));
                document.getElementById(target).classList.remove('hidden');
                document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
                btn.classList.add('active');
                if (target === 'view-lore') renderLorebook();
            };
        });

        function renderLorebook() {
            const container = document.getElementById('lorebook-content');
            container.innerHTML = '';
            nodesData.forEach(node => {
                const card = document.createElement('div');
                card.className = 'lore-card';
                card.id = `lore-item-${node.id}`;
                const rels = linksData.filter(l => {
                    const sId = typeof l.source === 'object' ? l.source.id : l.source;
                    const tId = typeof l.target === 'object' ? l.target.id : l.target;
                    return sId === node.id || tId === node.id;
                });
                let relHtml = '';
                rels.forEach(r => {
                    const sId = typeof r.source === 'object' ? r.source.id : r.source;
                    const otherId = sId === node.id ? (typeof r.target === 'object' ? r.target.id : r.target) : sId;
                    const other = nodesData.find(n => n.id === otherId);
                    if (other) {
                        relHtml += `<span class="bg-blue-50 text-blue-700 px-3 py-1 rounded-full text-xs font-bold mr-2 mb-2 inline-block cursor-pointer" onclick="scrollToLore('${other.id}')">${r.relation}: ${other.title}</span>`;
                    }
                });
                card.innerHTML = `
                    <div class="flex justify-between items-start mb-4">
                        <h4 class="text-2xl font-bold text-slate-800">${node.title}</h4>
                        <span class="px-2 py-1 rounded text-[10px] font-black text-white bg-slate-800 uppercase tracking-tighter">${node.type}</span>
                    </div>
                    <p class="text-slate-600 mb-6 bg-slate-50 p-4 rounded-xl border border-slate-100 whitespace-pre-wrap">${node.description || "説明なし"}</p>
                    <div class="mb-4">${(node.tags || []).map(t => `<span class="text-slate-400 text-xs mr-3"><i class="fa-solid fa-hashtag mr-1"></i>${t}</span>`).join('')}</div>
                    <div class="pt-4 border-t border-slate-100">
                        <div class="text-[10px] font-bold text-slate-300 uppercase mb-2">関連するロア</div>
                        <div class="flex flex-wrap">${relHtml || '<span class="text-slate-300 text-xs italic">なし</span>'}</div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        window.scrollToLore = (id) => {
            const el = document.getElementById(`lore-item-${id}`);
            if (el) el.scrollIntoView({ behavior: 'smooth', block: 'center' });
        };

        function showNotification(msg) {
            const n = document.getElementById('notification');
            n.innerText = msg; n.classList.remove('opacity-0');
            setTimeout(() => n.classList.add('opacity-0'), 3000);
        }

        function showAddNodeModal() { document.getElementById('modal-add-node').classList.remove('hidden'); }
        function hideAddNodeModal() { document.getElementById('modal-add-node').classList.add('hidden'); }
        
        function addNode() {
            const name = document.getElementById('new-node-name').value;
            const type = document.getElementById('new-node-type').value;
            if (!name) return;
            const newNode = { id: Date.now().toString(), title: name, type: type, description: "", tags: [] };
            nodesData.push(newNode);
            updateGraph();
            hideAddNodeModal();
            showNotification(`「${name}」を追加しました`);
        }

        function exportLorebookText() {
            const worldName = document.getElementById('world-name-input').value || "無名世界";
            let content = `=== 世界設定ロアブック: ${worldName} ===\n\n`;
            nodesData.forEach(node => {
                content += `=== ${node.title} ===\n`;
                content += `${node.description || "説明なし"}\n\n`;
            });
            const blob = new Blob([content], { type: "text/plain;charset=utf-8" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${worldName}_ロアブック.txt`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification(`${worldName}のロアブックを出力しました`);
        }

        function deleteNode() {
            if (!currentEditingNodeId) return;
            const nodeToDelete = nodesData.find(n => n.id === currentEditingNodeId);
            const nodeName = nodeToDelete ? nodeToDelete.title : "ノード";
            nodesData = nodesData.filter(n => n.id !== currentEditingNodeId);
            linksData = linksData.filter(l => {
                const sId = typeof l.source === 'object' ? l.source.id : l.source;
                const tId = typeof l.target === 'object' ? l.target.id : l.target;
                return sId !== currentEditingNodeId && tId !== currentEditingNodeId;
            });
            closeInfoPanel();
            updateGraph();
            showNotification(`「${nodeName}」と関連する関係線を削除しました`);
            currentEditingNodeId = null;
        }

        function exportWorldData() {
            const worldName = document.getElementById('world-name-input').value || "無名世界";
            const cleanLinks = linksData.map(l => ({
                source: typeof l.source === 'object' ? l.source.id : l.source,
                target: typeof l.target === 'object' ? l.target.id : l.target,
                relation: l.relation
            }));
            const data = {
                worldName: document.getElementById('world-name-input').value,
                nodes: nodesData.map(n => ({ ...n, x: n.x, y: n.y, fx: n.fx, fy: n.fy })), // 位置を保存
                links: cleanLinks
            };
            const blob = new Blob([JSON.stringify(data, null, 2)], { type: "application/json" });
            const link = document.createElement("a");
            link.href = URL.createObjectURL(blob);
            link.download = `${worldName}_設定データ.json`;
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
            showNotification(`${worldName}の設定データを保存しました`);
        }

        function importWorldData(event) {
            const file = event.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = function(e) {
                try {
                    const data = JSON.parse(e.target.result);
                    if (data.nodes && data.links) {
                        // 1. データのセット
                        nodesData = data.nodes;
                        // 重要: インポート時のリンクデータはID文字列であることを保証する
                        linksData = data.links.map(l => ({
                            source: typeof l.source === 'object' ? l.source.id : l.source,
                            target: typeof l.target === 'object' ? l.target.id : l.target,
                            relation: l.relation
                        }));
                        
                        if (data.worldName !== undefined) {
                            document.getElementById('world-name-input').value = data.worldName;
                        }
                        
                        closeInfoPanel();

                        // 2. シミュレーションのリセットとデータ再構築
                        simulation.stop();
                        simulation.nodes(nodesData);
                        // ここで一度linkForceを更新し、D3内部で文字列IDをオブジェクト参照に解決させる
                        simulation.force("link").links(linksData);
                        
                        // 3. グラフの物理的更新
                        updateGraph();
                        
                        // 4. 強制的に再起動
                        simulation.alpha(1).restart();
                        
                        // ロアブック表示中の場合は再描画
                        if (!document.getElementById('view-lore').classList.contains('hidden')) {
                            renderLorebook();
                        }
                        
                        showNotification("設定データを読み込みました！");
                    }
                } catch (error) {
                    console.error(error);
                    showNotification("ファイルの読み込みに失敗しちゃった");
                }
            };
            reader.readAsText(file);
            event.target.value = '';
        }

        window.onload = () => updateGraph();
    </script>
</body>
</html>
